<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Student Portfolio</title>
    <link rel="stylesheet" href="style/index.css">
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <nav class="nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About Me</a>
          <a href="projects.html">Projects</a>
          <a href="planner.html">Academic Planner</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>

        <div class="hero-content">
          <img
            class="profile-photo"
            src="assets/profile.jpg"
            alt="Student portrait"
          >
          <div class="intro">
            <p class="eyebrow">Contact</p>
            <h1>Let’s Connect</h1>
            <p class="welcome">Feel free to reach out with questions, opportunities, or collaboration ideas.</p>
          </div>
        </div>
      </header>

      <main class="content-grid">
        <section class="card">
          <h2>Send a Message</h2>
          <form id="contactForm" class="contact-form">
            <input id="name" name="name" type="text" placeholder="Name" aria-label="Name">
            <input id="email" name="email" type="email" placeholder="Email Address" aria-label="Email Address">
            <input id="phone" name="phone" type="tel" placeholder="Phone Number" aria-label="Phone Number">
            <textarea id="message" name="message" rows="5" placeholder="Message" aria-label="Message"></textarea>
            <button type="submit">Submit</button>
          </form>
          <p id="contactMessage" class="form-message"></p>
        </section>
      </main>

      <footer class="footer">
        <div class="social-links" aria-label="Social links">
          <a href="https://github.com/neth1122" target="_blank" rel="noreferrer">GitHub</a>
          <a href="https://www.linkedin.com/in/nethanel-enedeh-19231a314/" target="_blank" rel="noreferrer">LinkedIn</a>
          <a href="Enedeh_Nethanel_CV.pdf" target="_blank" rel="noreferrer">CV</a>
        </div>
        <p>© Copyright 2026 Nethanel Enedeh All Rights Reserved</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
