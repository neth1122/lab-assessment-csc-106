<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Academic Planner | Student Portfolio</title>
    <link rel="stylesheet" href="style/index.css">
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <nav class="nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About Me</a>
          <a href="projects.html">Projects</a>
          <a href="planner.html" class="active">Academic Planner</a>
          <a href="contact.html">Contact</a>
        </nav>

        <div class="hero-content">
          <div class="intro">
            <p class="eyebrow">Academic Planner</p>
            <h1>Stay Organized</h1>
            <p class="welcome">Plan your studies by adding tasks, marking them complete, and removing what is no longer needed.</p>
          </div>
        </div>
      </header>

      <main class="content-grid">
        <section class="card">
          <h2>Add a Task</h2>
          <form id="plannerForm" class="planner-form">
            <input id="taskInput" type="text" placeholder="Enter a new task" aria-label="New task">
            <button type="submit">Add Task</button>
          </form>
          <p id="plannerMessage" class="form-message"></p>
          <ul id="taskList" class="task-list"></ul>
        </section>
      </main>

      <footer class="footer">
        <p>© Copyright 2026 Nethanel Enedeh All Rights Reserved</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
